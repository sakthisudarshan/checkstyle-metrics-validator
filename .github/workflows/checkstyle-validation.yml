name: Checkstyle Lint Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run metric validation tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Maven verify with Checkstyle plugin
        run: ./mvnw -B clean verify -Ptestable-pipeline

      - name: Verify Checkstyle Maven output exists
        run: |
          test -f target/checkstyle-result.xml
          test -f checkstyle/0/checkstyle.json

      - name: Verify platform gate references Maven report
        run: |
          REPORT_PATH=$(python -c "import json; print(json.load(open('checkstyle/0/checkstyle.json'))['report_path'])")
          test "$REPORT_PATH" = "target/checkstyle-result.xml"
          test -f "$REPORT_PATH"

      - name: Verify zero scored violations
        run: |
          VIOLATIONS=$(python -c "import json; print(json.load(open('checkstyle/0/checkstyle.json'))['total_violations'])")
          test "$VIOLATIONS" = "0"

      - name: Upload metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-metrics-report
          path: |
            reports/
            checkstyle/0/checkstyle.json
            target/checkstyle-result.xml
            target/checkstyle/rule-coverage-result.xml
          retention-days: 30
